# Fly.io config for ScAI-Reader.
#
# Single stateless machine, no volume: the browser holds all personal data, and
# the server re-renders each session. `fly launch` will fill in / confirm `app`
# and `primary_region` for your account — adjust the placeholders below.

app = "scai-reader"
primary_region = "iad"

[build]

[env]
  # Non-secret config. Free OpenRouter router model; the API key is a secret
  # set with: fly secrets set OPENROUTER_API_KEY=sk-or-...
  OPENROUTER_MODEL = "openrouter/free"

[http_service]
  internal_port = 8080
  force_https = true
  # Scale to zero when idle to minimise cost; a request cold-starts the machine.
  # Set min_machines_running = 1 to keep it warm (no cold-start latency).
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  # The ephemeral PDF/render cache is per-machine, so a reader's requests must
  # land on one machine. Keep a SINGLE machine: `fly scale count 1`.
  [http_service.concurrency]
    type = "requests"
    soft_limit = 25
    hard_limit = 50

  # Liveness/readiness via the app's health endpoint.
  [[http_service.checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "10s"
    method = "GET"
    path = "/healthz"

[[vm]]
  size = "shared-cpu-1x"
  # PDF rendering (pypdfium2 + Pillow) is the memory-hungry part; 1 GB is safe.
  memory = "1gb"
  cpus = 1
