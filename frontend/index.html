<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ScAI-Reader</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <header class="toolbar">
      <div class="toolbar-group">
        <div id="sidebar-toggle-slot"></div>
        <span class="brand">ScAI-Reader</span>
      </div>
      <span class="toolbar-sep"></span>
      <div class="toolbar-group">
        <label class="upload">
          <input type="file" id="file" accept="application/pdf" hidden />
          <span>Open PDF…</span>
        </label>
      </div>
      <span class="toolbar-sep"></span>
      <div class="toolbar-group toolbar-tools">
        <div id="highlight-button-slot"></div>
        <div id="explain-button-slot"></div>
        <div id="erase-button-slot"></div>
      </div>
      <span class="toolbar-sep"></span>
      <div class="toolbar-group">
        <div id="zoom-controls-slot"></div>
        <div id="page-indicator-slot"></div>
      </div>
      <span id="doc-info" class="info"></span>
      <div class="toolbar-group">
        <div id="ai-setup-slot"></div>
      </div>
    </header>
    <div id="banner-slot"></div>
    <div class="main-area">
      <aside id="sidebar" class="sidebar" hidden></aside>
      <main id="viewer" class="viewer">
        <p class="empty">Loading library…</p>
      </main>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
